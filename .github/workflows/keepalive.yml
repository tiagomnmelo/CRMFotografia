name: Manter Supabase ativo

on:
  schedule:
    - cron: "0 12 */3 * *"   # a cada 3 dias
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Consulta leve no banco (mantem o Supabase ativo)
        run: |
          code=$(curl -sS --retry 4 --retry-delay 5 --max-time 30 \
            -o /dev/null -w "%{http_code}" \
            "https://kupgocnebynhpnkijajd.supabase.co/rest/v1/leads?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}") || true
          echo "Resposta do Supabase: HTTP $code"
          if [ "$code" = "200" ] || [ "$code" = "206" ]; then
            echo "OK: projeto ATIVO e keep-alive funcionando."
          elif [ "$code" = "401" ]; then
            echo "Projeto ATIVO, mas a chave (secret SUPABASE_ANON_KEY) esta errada ou vazia."
          elif [ "$code" = "404" ]; then
            echo "Projeto ATIVO (a tabela 'leads' respondeu 404 - tanto faz para o keep-alive)."
          else
            echo "SEM RESPOSTA VALIDA ($code). O projeto provavelmente esta PAUSADO."
            echo "Restaure no painel do Supabase e rode este workflow de novo."
          fi

      - name: Carimbo para manter o agendamento ativo
        run: |
          git config user.name  "keepalive-bot"
          git config user.email "bot@users.noreply.github.com"
          date -u > last-ping.txt
          git add last-ping.txt
          git commit -m "keepalive $(date -u +%F)" >/dev/null 2>&1 || true
          git push >/dev/null 2>&1 || true
          echo "carimbo ok"
